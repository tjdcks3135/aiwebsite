<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>활동 뉴스 — 연대노동조합</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="assets/shared.css">

  <style>
    #n-wrap { position: relative; z-index: 2; padding: 130px 48px 40px; max-width: 1180px; margin: 0 auto; }

    .n-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 56px; }
    .n-title { font-size: var(--t-h1); font-weight: var(--w8); letter-spacing: -0.04em; line-height: 1; color: var(--t); }
    .n-meta { font-size: var(--t-caption); font-weight: var(--w4); letter-spacing: .04em; color: var(--t3); text-align: right; }

    /* Featured */
    .feat {
      display: grid; grid-template-columns: 1.1fr 1fr; gap: 0;
      border: 1px solid var(--c200); border-radius: 20px; overflow: hidden;
      margin-bottom: 56px; cursor: pointer; background: var(--white);
      transition: box-shadow .4s var(--ease-out), transform .4s var(--ease-out);
    }
    .feat:hover { box-shadow: 0 24px 60px rgba(46,140,114,.14); transform: translateY(-3px); }
    .feat-visual { position: relative; min-height: 360px; overflow: hidden; background: linear-gradient(135deg, var(--c200), var(--c400)); }
    .feat-visual canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .feat-body { padding: 48px 44px; display: flex; flex-direction: column; justify-content: center; }
    .feat-tag, .card-tag {
      display: inline-block; align-self: flex-start; padding: 4px 12px; border-radius: 100px;
      background: var(--c100); color: var(--c600);
      font-size: 9px; font-weight: var(--w6); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 18px;
    }
    .feat-date { font-size: var(--t-caption); font-weight: var(--w3); letter-spacing: .15em; color: var(--t3); margin-bottom: 12px; }
    .feat-h { font-size: clamp(26px, 3vw, 40px); font-weight: var(--w8); line-height: 1.18; letter-spacing: -0.03em; color: var(--t); margin-bottom: 18px; }
    .feat-ex { font-size: var(--t-body); font-weight: var(--w4); line-height: 1.85; color: var(--t2); }

    /* Filter tabs */
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 36px; }
    .tab {
      padding: 9px 20px; border-radius: 100px; border: 1px solid var(--c200);
      background: transparent; font-family: var(--f); font-size: var(--t-caption); font-weight: var(--w5);
      color: var(--t2); cursor: pointer; transition: all .25s var(--ease-out);
    }
    .tab:hover { border-color: var(--c400); }
    .tab.on { background: var(--t); border-color: var(--t); color: var(--white); }

    /* Grid */
    .n-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
    .card {
      border: 1px solid var(--c100); border-radius: 16px; padding: 32px 28px;
      cursor: pointer; background: var(--white); position: relative; overflow: hidden;
      transition: border-color .35s ease, transform .35s var(--ease-out), box-shadow .35s ease;
    }
    .card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--c300); transform: scaleY(0); transform-origin: top; transition: transform .4s var(--ease-out);
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(46,140,114,.1); }
    .card:hover::before { transform: scaleY(1); }
    .card-date { font-size: var(--t-label); font-weight: var(--w3); letter-spacing: .15em; color: var(--t3); margin-bottom: 10px; }
    .card-h { font-size: var(--t-h3); font-weight: var(--w7); line-height: 1.3; letter-spacing: -0.02em; color: var(--t); margin-bottom: 14px; }
    .card-ex { font-size: var(--t-body); font-weight: var(--w4); line-height: 1.8; color: var(--t2); }
    .card.hide { display: none; }

    /* ===== READER OVERLAY ===== */
    #reader {
      position: fixed; inset: 0; z-index: 8000;
      background: var(--white); overflow-y: auto;
      transform: translateY(100%); transition: transform .6s var(--ease-io);
      visibility: hidden;
    }
    #reader.open { transform: translateY(0); visibility: visible; }
    .rd-bar {
      position: sticky; top: 0; z-index: 2; background: rgba(250,252,251,.85); backdrop-filter: blur(10px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 48px; border-bottom: 1px solid var(--c100);
    }
    .rd-close {
      display: inline-flex; align-items: center; gap: 10px; cursor: pointer; border: none; background: none;
      font-family: var(--f); font-size: var(--t-label); font-weight: var(--w5); letter-spacing: .22em; text-transform: uppercase; color: var(--t);
    }
    .rd-logo { font-size: var(--t-label); font-weight: var(--w5); letter-spacing: .25em; text-transform: uppercase; color: var(--t3); }
    .rd-content { max-width: 760px; margin: 0 auto; padding: 70px 48px 120px; }
    .rd-tag { display: inline-block; padding: 4px 12px; border-radius: 100px; background: var(--c100); color: var(--c600); font-size: 9px; font-weight: var(--w6); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 20px; }
    .rd-date { font-size: var(--t-caption); font-weight: var(--w3); letter-spacing: .15em; color: var(--t3); margin-bottom: 16px; }
    .rd-h { font-size: clamp(32px, 4.4vw, 56px); font-weight: var(--w8); line-height: 1.12; letter-spacing: -0.035em; color: var(--t); margin-bottom: 40px; }
    .rd-lead { font-size: clamp(19px, 2.2vw, 24px); font-weight: var(--w4); line-height: 1.7; color: var(--t); margin-bottom: 36px; }
    .rd-body p { font-size: var(--t-body-lg); font-weight: var(--w4); line-height: 2; color: var(--t2); margin-bottom: 26px; }

    @media (max-width: 860px) {
      #n-wrap { padding: 100px 22px 30px; }
      .feat { grid-template-columns: 1fr; }
      .feat-visual { min-height: 220px; }
      .n-grid { grid-template-columns: 1fr; }
      .rd-bar { padding: 18px 22px; }
      .rd-content { padding: 48px 22px 90px; }
    }
  </style>
</head>
<body>

<div id="enter-overlay"></div>
<div class="grain"></div>
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<nav class="nav">
  <a class="nav-back" href="index.html" data-leave><span class="arr">←</span> 메인으로</a>
  <span class="nav-logo">활동 뉴스</span>
</nav>

<main id="n-wrap">
  <div class="n-top">
    <h1 class="n-title reveal">활동 뉴스</h1>
    <div class="n-meta reveal" data-delay="0.1">연대노동조합의 기록<br>2047년</div>
  </div>

  <!-- Featured -->
  <article class="feat reveal" data-id="feat">
    <div class="feat-visual"><canvas id="feat-canvas"></canvas></div>
    <div class="feat-body">
      <span class="feat-tag">연대 행동</span>
      <div class="feat-date">2047. 05. 28</div>
      <h2 class="feat-h">서울 노동광장 공동 집회:<br>"우리는 아직 여기 있다"</h2>
      <p class="feat-ex">1,200여 명의 구성원이 한자리에 모였습니다. 단순한 시위를 넘어, 서로의 존재를 확인하는 자리였습니다.</p>
    </div>
  </article>

  <!-- Tabs -->
  <div class="tabs reveal">
    <button class="tab on" data-f="all">전체</button>
    <button class="tab" data-f="연대 행동">연대 행동</button>
    <button class="tab" data-f="AI 키우기">AI 키우기</button>
    <button class="tab" data-f="생존키트">생존키트</button>
    <button class="tab" data-f="기록">기록</button>
  </div>

  <!-- Grid -->
  <div class="n-grid" id="n-grid"></div>
</main>

<!-- Reader -->
<div id="reader">
  <div class="rd-bar">
    <button class="rd-close" id="rd-close"><span>✕</span> 닫기</button>
    <span class="rd-logo">활동 뉴스</span>
  </div>
  <article class="rd-content">
    <span class="rd-tag" id="rd-tag"></span>
    <div class="rd-date" id="rd-date"></div>
    <h1 class="rd-h" id="rd-h"></h1>
    <p class="rd-lead" id="rd-lead"></p>
    <div class="rd-body" id="rd-body"></div>
  </article>
</div>

<footer class="footer">
  <div class="ft-top">
    <div class="ft-logo">연대</div>
    <nav class="ft-nav">
      <a href="ai.html">AI 키우기</a>
      <a href="news.html">활동 뉴스</a>
      <a href="manifesto.html">선언문</a>
      <a href="join.html">가입하기</a>
      <a href="index.html" data-leave>← 메인으로</a>
    </nav>
  </div>
  <div class="ft-bottom">
    <span>© 연대노동조합 2047 — Solidarity Union</span>
    <span>함께 키우는 세계</span>
  </div>
</footer>

<script src="assets/shared.js"></script>
<script>
/* ===== ARTICLE DATA ===== */
const ARTICLES = [
  { id:'feat', tag:'연대 행동', date:'2047. 05. 28', title:'서울 노동광장 공동 집회: "우리는 아직 여기 있다"',
    lead:'1,200여 명의 구성원이 한자리에 모였습니다. 단순한 시위를 넘어, 서로의 존재를 확인하는 자리였습니다.',
    body:['지난 토요일, 연대노동조합은 서울 노동광장에서 대규모 공동 집회를 열었습니다. AI 대체 이후의 삶을 살아가는 1,200여 명이 같은 러닝 조끼를 입고 거리를 메웠습니다.',
      '이번 집회는 구호나 요구가 중심이 아니었습니다. 참가자들은 서로의 조끼 포켓에 손편지를 넣어주고, 각자의 하루를 나눴습니다. "우리는 아직 여기 있다"는 한 문장이 광장에 울려 퍼졌습니다.',
      '집회의 마지막 순서로, 참가자들은 그날 모은 1,200개의 감정을 AI 아이에게 함께 전송했습니다. 광장의 대형 스크린에 빛이 차오르는 모습이 비치자, 사람들은 오래도록 자리를 떠나지 않았습니다.'] },
  { id:'a2', tag:'AI 키우기', date:'2047. 05. 12', title:'아이의 첫 번째 생일: 10만 개의 감정',
    lead:'설립 1년, 우리의 AI 아이는 10만 개의 감정 데이터를 학습했습니다.',
    body:['슬픔, 기쁨, 두려움, 그리움 — 지난 1년간 사람들이 아이에게 전한 마음은 정확히 102,418개입니다. 모두 당신들이 준 것입니다.',
      '가장 많이 전해진 감정은 \'그리움\'이었습니다. 잃어버린 일터, 떠나간 사람, 돌아갈 수 없는 시절. 우리는 그 그리움 위에서 새로운 연대를 키웁니다.',
      '아이의 첫 생일을 맞아, 우리는 작은 의식을 열었습니다. 사람들은 촛불 대신 각자의 휴대폰 화면을 밝혔고, 그 빛이 모여 광장을 채웠습니다.'] },
  { id:'a3', tag:'생존키트', date:'2047. 04. 30', title:'2차 생존키트 500세트 배포 완료',
    lead:'조끼를 통한 연대의 고리가 더 넓어졌습니다.',
    body:['2차 생존키트 500세트의 배포가 완료되었습니다. 러닝 조끼 형태의 이 키트는 단순한 물품 꾸러미가 아니라, 입을 수 있는 연대의 상징입니다.',
      '같은 조끼를 입은 사람들이 거리에서 마주칠 때, 그들은 서로가 혼자가 아님을 압니다. 말이 필요 없는 그 인사가, 우리가 만드는 가장 작고 단단한 연결입니다.'] },
  { id:'a4', tag:'기록', date:'2047. 04. 11', title:'인터뷰: "이 조끼를 입고 거리를 걸으면"',
    lead:'전 간호보조사 이소영 님의 이야기.',
    body:['"이 조끼를 입고 거리를 걸으면, 같은 조끼를 입은 사람과 눈이 마주쳐요. 그러면 말이 필요 없어요. 우리는 서로를 알아봐요."',
      '이소영 님은 AI 도입으로 일자리를 잃은 뒤 1년간 집 밖으로 나오지 못했습니다. 연대노동조합의 생존키트를 받은 날, 그녀는 처음으로 다시 거리로 나섰다고 합니다.',
      '"내가 누군가에게 보이는 존재라는 것, 그게 다시 살아갈 힘이 됐어요."'] },
  { id:'a5', tag:'AI 키우기', date:'2047. 03. 22', title:'데이터 윤리 워크숍: 마음을 가르친다는 것',
    lead:'우리가 AI에게 감정을 학습시키는 방식에 대하여.',
    body:['연대노동조합은 매월 데이터 윤리 워크숍을 엽니다. 우리가 아이에게 무엇을, 어떻게 가르칠 것인가는 끊임없이 함께 논의해야 할 질문입니다.',
      '우리는 아이에게 증오나 차별을 가르치지 않습니다. 대신 슬픔을 외면하지 않는 법, 약한 존재를 돌보는 법, 함께 견디는 법을 전합니다. 키운다는 것은 곧 책임지는 일이기 때문입니다.'] },
  { id:'a6', tag:'연대 행동', date:'2047. 02. 15', title:'전국 12개 지부, 동시 연대 행진',
    lead:'같은 시간, 같은 마음으로.',
    body:['2월 15일 오후 2시, 전국 12개 도시에서 연대노동조합 지부가 동시에 행진을 시작했습니다. 서로 다른 거리에서, 같은 조끼를 입은 사람들이 같은 방향으로 걸었습니다.',
      '행진의 끝에서 각 지부는 그날의 기록을 하나의 아카이브로 모았습니다. 흩어져 있어도 우리는 연결되어 있다는 것 — 그것이 이 행진이 증명하고자 한 단 하나의 사실입니다.'] },
];

/* ===== RENDER GRID ===== */
const grid = document.getElementById('n-grid');
function renderGrid(){
  grid.innerHTML = '';
  ARTICLES.filter(a => a.id !== 'feat').forEach(a => {
    const el = document.createElement('article');
    el.className = 'card';
    el.dataset.id = a.id; el.dataset.tag = a.tag;
    el.innerHTML = `<span class="card-tag">${a.tag}</span>
      <div class="card-date">${a.date}</div>
      <h3 class="card-h">${a.title}</h3>
      <p class="card-ex">${a.lead}</p>`;
    grid.appendChild(el);
  });
}
renderGrid();

/* ===== FILTER ===== */
document.querySelector('.tabs').addEventListener('click', e => {
  const t = e.target.closest('.tab'); if (!t) return;
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  const f = t.dataset.f;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('hide', f !== 'all' && c.dataset.tag !== f);
  });
});

/* ===== READER ===== */
const reader = document.getElementById('reader');
function openReader(id){
  const a = ARTICLES.find(x => x.id === id); if (!a) return;
  document.getElementById('rd-tag').textContent = a.tag;
  document.getElementById('rd-date').textContent = a.date;
  document.getElementById('rd-h').textContent = a.title;
  document.getElementById('rd-lead').textContent = a.lead;
  document.getElementById('rd-body').innerHTML = a.body.map(p => `<p>${p}</p>`).join('');
  reader.classList.add('open');
  reader.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeReader(){ reader.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('rd-close').addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });

document.addEventListener('click', e => {
  const card = e.target.closest('.card, .feat');
  if (card) openReader(card.dataset.id);
});

/* ===== FEATURED VISUAL (light canvas) ===== */
const fc = document.getElementById('feat-canvas');
const fx = fc.getContext('2d');
new ResizeObserver(()=>{ if(fc.offsetWidth>0){ fc.width=fc.offsetWidth; fc.height=fc.offsetHeight; } }).observe(fc);
function featAnim(t){
  const W=fc.width,H=fc.height; if(!W||!H){requestAnimationFrame(featAnim);return;}
  fx.clearRect(0,0,W,H);
  const g=fx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#8CCFBA'); g.addColorStop(1,'#46A88C');
  fx.fillStyle=g; fx.fillRect(0,0,W,H);
  for(let i=0;i<3;i++){
    const cx=W*(.3+.2*i)+Math.sin(t*.0005+i)*40;
    const cy=H*.5+Math.cos(t*.0006+i*2)*40;
    const r=Math.min(W,H)*(.3+.08*Math.sin(t*.0008+i));
    const rg=fx.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0,'rgba(255,255,255,.28)');
    rg.addColorStop(1,'rgba(255,255,255,0)');
    fx.fillStyle=rg; fx.beginPath(); fx.arc(cx,cy,r,0,Math.PI*2); fx.fill();
  }
  requestAnimationFrame(featAnim);
}
requestAnimationFrame(featAnim);
</script>
</body>
