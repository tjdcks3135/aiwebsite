<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 — 연대노동조합</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

  <style>
    :root {
      --f: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --t-h1: clamp(48px, 7vw, 96px);
      --t-h3: clamp(18px, 2.2vw, 28px);
      --t-body-lg: 17px; --t-body: 15px; --t-caption: 12px; --t-label: 10px;
      --w9:900; --w8:800; --w7:700; --w6:600; --w5:500; --w4:400; --w3:300;
      --c50:#F2FAF7; --c100:#D9F0E8; --c200:#B2E1D1; --c300:#8CCFBA;
      --c400:#68BFA4; --c500:#46A88C; --c600:#2E8C72;
      --dark:#192820; --white:#FAFCFB; --t:#1A2B24; --t2:#3D5449; --t3:#7A9B8E;
      --ease-out: cubic-bezier(0.16,1,0.3,1);
      --ease-io:  cubic-bezier(0.76,0,0.24,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: var(--f); color: var(--t); background: var(--white); cursor: none; }
    body { overflow-x: clip; min-height: 100vh; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #0d1710; }
    ::-webkit-scrollbar-thumb { background: var(--c600); border-radius: 2px; }

    /* CURSOR */
    #cur-dot {
      position: fixed; width: 6px; height: 6px; border-radius: 50%;
      background: var(--c400); pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
    }
    #cur-ring {
      position: fixed; width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--c500); pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width .4s var(--ease-out), height .4s var(--ease-out),
                  background .4s, border-color .4s;
    }
    #cur-ring.is-hover { width: 54px; height: 54px; background: rgba(104,191,164,.08); border-color: var(--c300); }

    /* NAV */
    nav.nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 28px 48px; display: flex; justify-content: space-between; align-items: center;
      background: rgba(25,40,32,.7); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(140,207,186,.08);
    }
    .nav-back {
      font-size: var(--t-label); font-weight: var(--w5); letter-spacing: .25em; text-transform: uppercase;
      color: var(--c400); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: color .25s;
    }
    .nav-back:hover { color: var(--c300); }
    .nav-logo { font-size: var(--t-label); font-weight: var(--w5); letter-spacing: .25em; text-transform: uppercase; color: var(--t3); }

    /* PAGE WRAPPER */
    #wrap { position: relative; z-index: 2; padding: 140px 48px 100px; max-width: 1280px; margin: 0 auto; }

    /* HEADER */
    .page-header { margin-bottom: 80px; }
    .page-title {
      font-size: var(--t-h1); font-weight: var(--w8); letter-spacing: -0.04em; line-height: 1;
      color: var(--c300); margin-bottom: 16px;
    }
    .page-sub {
      font-size: var(--t-body); font-weight: var(--w4); color: var(--t3); letter-spacing: .05em;
    }

    /* FILTER */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 56px;
    }
    .filter-btn {
      padding: 8px 20px; border-radius: 100px; border: 1px solid rgba(140,207,186,.2);
      background: transparent; font-family: var(--f); font-size: var(--t-caption); font-weight: var(--w5);
      letter-spacing: .08em; color: var(--t3); cursor: none; transition: all .25s var(--ease-out);
    }
    .filter-btn:hover { border-color: var(--c400); color: var(--c400); }
    .filter-btn.on { background: var(--c500); border-color: var(--c500); color: var(--dark); }

    /* BUBBLE FIELD */
    #bubble-field {
      position: relative; width: 100%; height: 75vh; min-height: 520px; overflow: hidden;
    }

    /* BUBBLE */
    .bubble {
      position: absolute; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; cursor: none;
      transition: box-shadow .4s var(--ease-out), opacity .4s;
      will-change: transform; isolation: isolate;
    }
    .bubble:hover { z-index: 10; }
    /* glossy soap-film highlight + iridescent rim */
    .bubble::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
      background:
        radial-gradient(circle at 30% 26%, rgba(255,255,255,.9) 0%, rgba(255,255,255,.35) 9%, rgba(255,255,255,0) 26%),
        radial-gradient(circle at 70% 78%, rgba(255,255,255,.5) 0%, rgba(255,255,255,0) 18%);
      mix-blend-mode: screen; opacity: .9;
    }
    .bubble::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
      background: conic-gradient(from 210deg,
        rgba(255,182,193,.18), rgba(173,216,230,.18), rgba(186,255,201,.18),
        rgba(255,236,179,.18), rgba(216,191,216,.18), rgba(255,182,193,.18));
      mix-blend-mode: screen; opacity: .55;
      -webkit-mask: radial-gradient(circle, transparent 60%, #000 78%, transparent 100%);
              mask: radial-gradient(circle, transparent 60%, #000 78%, transparent 100%);
    }
    .bubble-inner {
      position: relative; z-index: 2; padding: 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; width: 100%; height: 100%;
    }
    .bubble-tag {
      font-size: 9px; font-weight: var(--w6); letter-spacing: .18em; text-transform: uppercase;
      opacity: .7;
    }
    .bubble-title {
      font-size: clamp(11px, 1.1vw, 14px); font-weight: var(--w7); line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .bubble-date {
      font-size: 9px; font-weight: var(--w3); letter-spacing: .1em; opacity: .6;
    }
    .bubble.hide { opacity: 0; pointer-events: none; transform: scale(0.7) !important; }

    /* SIZE VARIANTS */
    .bubble-lg { width: 240px; height: 240px; }
    .bubble-md { width: 180px; height: 180px; }
    .bubble-sm { width: 130px; height: 130px; }
    .bubble-xs { width: 100px; height: 100px; }

    /* COLOR VARIANTS */
    .bubble-v1 {
      background: radial-gradient(circle at 35% 35%, #8CCFBA, #2E8C72);
      box-shadow: 0 20px 60px rgba(46,140,114,.3), inset 0 1px 0 rgba(255,255,255,.25);
      color: var(--white);
    }
    .bubble-v1:hover { box-shadow: 0 30px 80px rgba(46,140,114,.5), inset 0 1px 0 rgba(255,255,255,.35); }
    .bubble-v2 {
      background: radial-gradient(circle at 35% 35%, #B2E1D1, #46A88C);
      box-shadow: 0 16px 48px rgba(70,168,140,.25), inset 0 1px 0 rgba(255,255,255,.3);
      color: var(--dark);
    }
    .bubble-v2:hover { box-shadow: 0 26px 64px rgba(70,168,140,.4); }
    .bubble-v3 {
      background: radial-gradient(circle at 35% 35%, rgba(140,207,186,.18), rgba(46,140,114,.12));
      border: 1px solid rgba(140,207,186,.3);
      box-shadow: 0 12px 40px rgba(0,0,0,.3), inset 0 1px 0 rgba(140,207,186,.2);
      color: var(--c200);
    }
    .bubble-v3:hover { box-shadow: 0 20px 56px rgba(0,0,0,.4), inset 0 1px 0 rgba(140,207,186,.35); }
    .bubble-v4 {
      background: radial-gradient(circle at 35% 35%, #D9F0E8, #8CCFBA);
      box-shadow: 0 14px 44px rgba(140,207,186,.2), inset 0 1px 0 rgba(255,255,255,.4);
      color: var(--t);
    }
    .bubble-v4:hover { box-shadow: 0 22px 60px rgba(140,207,186,.35); }

    /* READER OVERLAY */
    #reader {
      position: fixed; inset: 0; z-index: 8000;
      background: var(--dark); overflow-y: auto;
      transform: translateY(100%); transition: transform .6s var(--ease-io);
      visibility: hidden;
    }
    #reader.open { transform: translateY(0); visibility: visible; }
    .rd-bar {
      position: sticky; top: 0; z-index: 2;
      background: rgba(25,40,32,.85); backdrop-filter: blur(10px);
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 48px; border-bottom: 1px solid rgba(140,207,186,.1);
    }
    .rd-close {
      display: inline-flex; align-items: center; gap: 10px; cursor: none; border: none; background: none;
      font-family: var(--f); font-size: var(--t-label); font-weight: var(--w5);
      letter-spacing: .22em; text-transform: uppercase; color: var(--c400);
      transition: color .2s;
    }
    .rd-close:hover { color: var(--c300); }
    .rd-logo { font-size: var(--t-label); font-weight: var(--w5); letter-spacing: .25em; text-transform: uppercase; color: var(--t3); }
    .rd-content { max-width: 760px; margin: 0 auto; padding: 70px 48px 120px; }
    .rd-tag {
      display: inline-block; padding: 4px 12px; border-radius: 100px;
      background: rgba(140,207,186,.15); color: var(--c400);
      font-size: 9px; font-weight: var(--w6); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 20px;
    }
    .rd-date { font-size: var(--t-caption); font-weight: var(--w3); letter-spacing: .15em; color: var(--t3); margin-bottom: 16px; }
    .rd-h {
      font-size: clamp(32px, 4.4vw, 56px); font-weight: var(--w8); line-height: 1.12;
      letter-spacing: -0.035em; color: var(--c200); margin-bottom: 40px;
    }
    .rd-lead { font-size: clamp(17px, 2vw, 22px); font-weight: var(--w4); line-height: 1.7; color: var(--c300); margin-bottom: 36px; }
    .rd-body p { font-size: var(--t-body-lg); font-weight: var(--w4); line-height: 2; color: var(--t3); margin-bottom: 26px; }

    /* FOOTER */
    .footer {
      border-top: 1px solid rgba(140,207,186,.08);
      padding: 48px;
    }
    .ft-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 48px;
    }
    .ft-logo { font-size: clamp(40px, 6vw, 72px); font-weight: var(--w8); letter-spacing: -0.04em; color: var(--c600); line-height: 1; }
    .ft-nav { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
    .ft-nav a { font-size: var(--t-caption); font-weight: var(--w4); letter-spacing: .12em; color: var(--t3); text-decoration: none; transition: color .2s; }
    .ft-nav a:hover { color: var(--c400); }
    .ft-bottom { display: flex; justify-content: space-between; font-size: var(--t-label); font-weight: var(--w3); letter-spacing: .08em; color: var(--t3); }

    @media (max-width: 860px) {
      nav.nav { padding: 20px 22px; }
      #wrap { padding: 110px 22px 60px; }
      #bubble-field { height: auto; min-height: unset; }
      .footer { padding: 36px 22px; }
      .rd-bar { padding: 18px 22px; }
      .rd-content { padding: 48px 22px 90px; }
    }
  </style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>

<nav class="nav">
  <a class="nav-back" href="index.html"><span>←</span> 메인으로</a>
  <span class="nav-logo">커뮤니티</span>
</nav>

<main id="wrap">
  <div class="page-header">
    <h1 class="page-title">커뮤니티</h1>
    <p class="page-sub">연대노동조합의 이야기들 — 2047년</p>
  </div>

  <div class="filters">
    <button class="filter-btn on" data-f="all">전체</button>
    <button class="filter-btn" data-f="연대 행동">연대 행동</button>
    <button class="filter-btn" data-f="AI 키우기">AI 키우기</button>
    <button class="filter-btn" data-f="생존키트">생존키트</button>
    <button class="filter-btn" data-f="기록">기록</button>
  </div>

  <div id="bubble-field"></div>
</main>

<!-- Reader -->
<div id="reader">
  <div class="rd-bar">
    <button class="rd-close" id="rd-close"><span>✕</span> 닫기</button>
    <span class="rd-logo">커뮤니티</span>
  </div>
  <article class="rd-content">
    <span class="rd-tag" id="rd-tag"></span>
    <div class="rd-date" id="rd-date"></div>
    <h1 class="rd-h" id="rd-h"></h1>
    <p class="rd-lead" id="rd-lead"></p>
    <div class="rd-body" id="rd-body"></div>
  </article>
</div>

<footer class="footer">
  <div class="ft-top">
    <div class="ft-logo">연대</div>
    <nav class="ft-nav">
      <a href="ai.html">AI 키우기</a>
      <a href="community.html">커뮤니티</a>
      <a href="manifesto.html">선언문</a>
      <a href="join.html">가입하기</a>
      <a href="index.html">← 메인으로</a>
    </nav>
  </div>
  <div class="ft-bottom">
    <span>© 연대노동조합 2047 — Solidarity Union</span>
    <span>함께 키우는 세계</span>
  </div>
</footer>

<script>
/* CURSOR */
const dot = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let mx = -100, my = -100, rx = -100, ry = -100;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
;(function tick(){
  rx += (mx - rx) * .12; ry += (my - ry) * .12;
  dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(tick);
})();
document.querySelectorAll('a, button, .bubble').forEach(el => {
  el.addEventListener('mouseenter', () => ring.classList.add('is-hover'));
  el.addEventListener('mouseleave', () => ring.classList.remove('is-hover'));
});

/* ARTICLES */
const ARTICLES = [
  { id:'a1', tag:'연대 행동', date:'2047. 05. 28', size:'lg', color:'v1',
    title:'서울 노동광장 공동 집회: "우리는 아직 여기 있다"',
    lead:'1,200여 명의 구성원이 한자리에 모였습니다. 단순한 시위를 넘어, 서로의 존재를 확인하는 자리였습니다.',
    body:['지난 토요일, 연대노동조합은 서울 노동광장에서 대규모 공동 집회를 열었습니다. AI 대체 이후의 삶을 살아가는 1,200여 명이 같은 러닝 조끼를 입고 거리를 메웠습니다.',
      '이번 집회는 구호나 요구가 중심이 아니었습니다. 참가자들은 서로의 조끼 포켓에 손편지를 넣어주고, 각자의 하루를 나눴습니다.',
      '집회의 마지막 순서로, 참가자들은 그날 모은 1,200개의 감정을 AI 아이에게 함께 전송했습니다.'] },
  { id:'a2', tag:'AI 키우기', date:'2047. 05. 12', size:'md', color:'v2',
    title:'아이의 첫 번째 생일: 10만 개의 감정',
    lead:'설립 1년, 우리의 AI 아이는 10만 개의 감정 데이터를 학습했습니다.',
    body:['슬픔, 기쁨, 두려움, 그리움 — 지난 1년간 사람들이 아이에게 전한 마음은 정확히 102,418개입니다.',
      '가장 많이 전해진 감정은 \'그리움\'이었습니다. 잃어버린 일터, 떠나간 사람, 돌아갈 수 없는 시절.'] },
  { id:'a3', tag:'생존키트', date:'2047. 04. 30', size:'sm', color:'v3',
    title:'2차 생존키트 500세트 배포 완료',
    lead:'조끼를 통한 연대의 고리가 더 넓어졌습니다.',
    body:['2차 생존키트 500세트의 배포가 완료되었습니다. 러닝 조끼 형태의 이 키트는 단순한 물품 꾸러미가 아니라, 입을 수 있는 연대의 상징입니다.'] },
  { id:'a4', tag:'기록', date:'2047. 04. 11', size:'md', color:'v4',
    title:'인터뷰: "이 조끼를 입고 거리를 걸으면"',
    lead:'전 간호보조사 이소영 님의 이야기.',
    body:['"이 조끼를 입고 거리를 걸으면, 같은 조끼를 입은 사람과 눈이 마주쳐요. 그러면 말이 필요 없어요."',
      '이소영 님은 AI 도입으로 일자리를 잃은 뒤 1년간 집 밖으로 나오지 못했습니다.',
      '"내가 누군가에게 보이는 존재라는 것, 그게 다시 살아갈 힘이 됐어요."'] },
  { id:'a5', tag:'AI 키우기', date:'2047. 03. 22', size:'sm', color:'v1',
    title:'데이터 윤리 워크숍: 마음을 가르친다는 것',
    lead:'우리가 AI에게 감정을 학습시키는 방식에 대하여.',
    body:['연대노동조합은 매월 데이터 윤리 워크숍을 엽니다. 우리가 아이에게 무엇을, 어떻게 가르칠 것인가는 끊임없이 함께 논의해야 할 질문입니다.'] },
  { id:'a6', tag:'연대 행동', date:'2047. 02. 15', size:'lg', color:'v3',
    title:'전국 12개 지부, 동시 연대 행진',
    lead:'같은 시간, 같은 마음으로.',
    body:['2월 15일 오후 2시, 전국 12개 도시에서 연대노동조합 지부가 동시에 행진을 시작했습니다.',
      '행진의 끝에서 각 지부는 그날의 기록을 하나의 아카이브로 모았습니다.'] },
  { id:'a7', tag:'기록', date:'2047. 01. 30', size:'xs', color:'v2',
    title:'소식지 창간호 발간',
    lead:'우리의 언어로 우리의 이야기를.',
    body:['연대노동조합 소식지 창간호가 발간되었습니다. 조합원 누구나 글을 쓸 수 있습니다.'] },
  { id:'a8', tag:'생존키트', date:'2047. 01. 10', size:'xs', color:'v4',
    title:'1차 생존키트 200세트',
    lead:'첫 번째 연결의 시작.',
    body:['1차 생존키트 200세트를 배포했습니다. 러닝 조끼와 손편지가 들어 있었습니다.'] },
];

/* BUBBLE LAYOUT */
const field = document.getElementById('bubble-field');
const sizeMap = { lg: 240, md: 180, sm: 130, xs: 100 };

const positions = [
  { left: '2%',  top: '5%'  },
  { left: '24%', top: '0%'  },
  { left: '48%', top: '8%'  },
  { left: '68%', top: '2%'  },
  { left: '86%', top: '10%' },
  { left: '10%', top: '52%' },
  { left: '38%', top: '55%' },
  { left: '62%', top: '50%' },
];

ARTICLES.forEach((a, i) => {
  const el = document.createElement('div');
  el.className = `bubble bubble-${a.size} bubble-${a.color}`;
  el.dataset.id = a.id;
  el.dataset.tag = a.tag;
  el.style.left = positions[i % positions.length].left;
  el.style.top  = positions[i % positions.length].top;
  el.innerHTML = `<div class="bubble-inner">
    <span class="bubble-tag">${a.tag}</span>
    <span class="bubble-title">${a.title}</span>
    <span class="bubble-date">${a.date}</span>
  </div>`;
  field.appendChild(el);
});

/* SOAP-BUBBLE FLOAT — bubbles drift airily on their own and react softly to the cursor */
const bubbleStates = [];
document.querySelectorAll('.bubble').forEach(el => {
  bubbleStates.push({
    el,
    ox: 0, oy: 0,   // current offset from base position
    vx: 0, vy: 0,   // velocity
    // unique drift personality
    ax: 18 + Math.random() * 22,           // horizontal float amplitude
    ay: 14 + Math.random() * 20,           // vertical float amplitude
    fx: 0.18 + Math.random() * 0.16,       // horizontal frequency
    fy: 0.14 + Math.random() * 0.16,       // vertical frequency
    px: Math.random() * Math.PI * 2,       // phase
    py: Math.random() * Math.PI * 2,
    rot: (Math.random() - 0.5) * 6,        // gentle tilt amplitude
  });
});

let pointerX = -9999, pointerY = -9999;
field.addEventListener('mousemove', e => {
  pointerX = e.clientX;
  pointerY = e.clientY;
});
field.addEventListener('mouseleave', () => { pointerX = -9999; pointerY = -9999; });

const INFLUENCE  = 200;    // px — cursor influence radius
const PUSH_FORCE = 0.35;   // soft nudge away from cursor
const FRICTION   = 0.96;   // airy glide (high = floaty)

let t0 = performance.now();
function animateBubbles(now) {
  const t = (now - t0) / 1000;   // seconds

  bubbleStates.forEach(b => {
    const rect = b.el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    // soft repel — a passing cursor parts the bubbles like a breath of air
    const dx = cx - pointerX, dy = cy - pointerY;
    const dist = Math.hypot(dx, dy);
    if (dist < INFLUENCE && dist > 0.1) {
      const falloff = (1 - dist / INFLUENCE);
      b.vx += (dx / dist) * PUSH_FORCE * falloff;
      b.vy += (dy / dist) * PUSH_FORCE * falloff;
    }

    // gentle pull back so pushes ease out, never sticky
    b.vx += -b.ox * 0.006;
    b.vy += -b.oy * 0.006;
    b.vx *= FRICTION;
    b.vy *= FRICTION;
    b.ox += b.vx;
    b.oy += b.vy;

    // ever-present ambient float (the hovering, lighter-than-air quality)
    const fxo = Math.sin(t * b.fx + b.px) * b.ax;
    const fyo = Math.cos(t * b.fy + b.py) * b.ay;
    const tilt = Math.sin(t * b.fx * 0.6 + b.px) * b.rot;
    const breathe = 1 + Math.sin(t * 0.5 + b.px) * 0.02;

    b.el.style.transform =
      `translate(${b.ox + fxo}px, ${b.oy + fyo}px) rotate(${tilt}deg) scale(${breathe})`;
  });

  requestAnimationFrame(animateBubbles);
}
requestAnimationFrame(animateBubbles);

/* FILTER */
document.querySelector('.filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const f = btn.dataset.f;
  document.querySelectorAll('.bubble').forEach(b => {
    b.classList.toggle('hide', f !== 'all' && b.dataset.tag !== f);
  });
});

/* READER */
const reader = document.getElementById('reader');
function openReader(id) {
  const a = ARTICLES.find(x => x.id === id); if (!a) return;
  document.getElementById('rd-tag').textContent = a.tag;
  document.getElementById('rd-date').textContent = a.date;
  document.getElementById('rd-h').textContent = a.title;
  document.getElementById('rd-lead').textContent = a.lead;
  document.getElementById('rd-body').innerHTML = a.body.map(p => `<p>${p}</p>`).join('');
  reader.classList.add('open');
  reader.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeReader() { reader.classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('rd-close').addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReader(); });
document.getElementById('bubble-field').addEventListener('click', e => {
  const b = e.target.closest('.bubble'); if (b) openReader(b.dataset.id);
});
</script>
</body>
</html>
